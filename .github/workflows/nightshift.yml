name: Alfie Night Shift

on:
  schedule:
    # 6:00 AM IST = 00:30 UTC
    - cron: '30 0 * * *'
    # 7:00 AM IST = 01:30 UTC
    - cron: '30 1 * * *'
    # 1:30 PM IST = 08:00 UTC
    - cron: '0 8 * * *'
    # 9:30 PM IST = 16:00 UTC
    - cron: '0 16 * * *'

permissions:
  contents: write

jobs:
  run-collectors:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || echo "No requirements.txt"
      
      - name: Run orchestrator
        run: timeout 30m python3 orchestrator.py || true
      
      - name: Push results
        run: |
          git config user.name "Alfie Bot"
          git config user.email "bot@alfie.local"
          git add -A
          git commit -m "Nightshift run - $(date)" || echo "Nothing to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
